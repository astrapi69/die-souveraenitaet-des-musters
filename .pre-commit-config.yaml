repos:
  # --- Python Linting / Formatting ------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-PyYAML
          - types-toml
          - types-requests
        args: ["--ignore-missing-imports", "--follow-imports=silent", "--show-error-codes"]

  # --- Markdown & Spelling --------------------------------------------------
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        # The book manuscript and its cover/config content are authored
        # German prose; markdownlint's heading/HTML rules are not
        # meaningful gates for it.
        exclude: ^(manuscript|config|assets)/

  - repo: https://github.com/codespell-project/codespell
    rev: v2.3.0
    hooks:
      - id: codespell
        args: ["--ignore-words=.codespellignore"]
        # codespell is English-only; skip the German manuscript and the
        # German cover/config content.
        exclude: ^(manuscript|config|assets)/

  # --- Security / Secrets ---------------------------------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        args: ["--staged"]

  # --- Misc / Hygiene -------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
        # Preserve Markdown hard line breaks (two trailing spaces), used
        # e.g. in the German imprint block.
        args: [--markdown-linebreak-ext=md]
      - id: check-added-large-files
