# ---- Beschreibung (Klappentext / Verkaufstext) ----------------
description: >
  Die Biotechnologie nähert sich dem alten Traum, das Leben zu
  verlängern und den Geist zu bewahren. Doch was genau würde
  fortbestehen, wenn sich der Körper erhalten oder das Bewusstsein
  übertragen ließe? Asterios Raptis zeigt, dass der Mensch nicht
  ein Muster ist, sondern viele: ein Denken, eine Lebensgeschichte,
  ein Körperwissen, ein Fühlen, eine Sprache, eine Wunde. Schicht
  für Schicht prüft dieses Buch nüchtern und wissenschaftlich
  grundiert, was sich erhalten lässt und was im Versuch der
  Übertragung unweigerlich verloren geht. Daraus erwächst die
  Forderung nach einem neuen Grundrecht: der Souveränität über die
  eigenen Muster. Ein Buch gegen den Hype und für eine klare Frage,
  wer über das Innerste eines Menschen verfügen darf.

# kurze Variante für Metadatenfelder mit Zeichenbegrenzung
description_short: >
  Was bleibt vom Menschen, wenn Körper und Geist übertragbar werden?
  Eine nüchterne Vermessung der Schichten unserer Identität und ein
  Plädoyer für ein neues Grundrecht: die Souveränität über die
  eigenen Muster.

